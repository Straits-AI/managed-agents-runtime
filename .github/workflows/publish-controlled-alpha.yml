name: Publish controlled alpha

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      actions: read
      contents: read
    services:
      postgres:
        image: postgres:16@sha256:33f923b05f64ca54ac4401c01126a6b92afe839a0aa0a52bc5aeb5cc958e5f20
        env:
          POSTGRES_USER: postgres
          POSTGRES_HOST_AUTH_METHOD: trust
          POSTGRES_DB: postgres
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 15
    env:
      TEST_DATABASE_URL: postgres://postgres@127.0.0.1:5433/postgres
      RELEASE_VERSION: 0.1.0-alpha.2
      RELEASE_TAG: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0, Node 24
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Require annotated tag on the verified main commit
        id: boundary
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          test "$(git cat-file -t "refs/tags/${RELEASE_TAG}")" = "tag"
          release_commit="$(git rev-list -n 1 "refs/tags/${RELEASE_TAG}")"
          git fetch --no-tags origin main:refs/remotes/origin/main
          main_commit="$(git rev-parse refs/remotes/origin/main)"
          test "${release_commit}" = "${main_commit}"
          gate_runs="$(gh api \
            --method GET \
            -f event=push \
            -f status=completed \
            -f head_sha="${release_commit}" \
            -f per_page=100 \
            "/repos/${GITHUB_REPOSITORY}/actions/workflows/controlled-alpha-gate.yml/runs")"
          jq -e \
            --arg commit "${release_commit}" \
            '.workflow_runs | any(.head_sha == $commit and .event == "push" and .conclusion == "success")' \
            <<<"${gate_runs}"
          echo "commit=${release_commit}" >> "${GITHUB_OUTPUT}"
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0, Node 24
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Verify tag, package, and changelog agreement
        run: npm run release:version
      - name: Run exact-tag controlled-alpha gate
        env:
          RELEASE_GATE_COMMIT: ${{ steps.boundary.outputs.commit }}
        run: npm run release:gate -- --evidence-dir release-evidence/kernel
      - name: Retain exact-commit validation evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1, Node 24
        with:
          name: controlled-alpha-validation-${{ github.ref_name }}
          path: release-evidence/kernel/
          if-no-files-found: error
          retention-days: 90
    outputs:
      commit: ${{ steps.boundary.outputs.commit }}

  publish:
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 35
    permissions:
      actions: read
      contents: write
      packages: write
    env:
      RELEASE_VERSION: 0.1.0-alpha.2
      RELEASE_TAG: ${{ github.ref_name }}
      RELEASE_COMMIT: ${{ needs.validate.outputs.commit }}
      RELEASE_EVIDENCE_DIR: release-evidence/container
      REGISTRY_IMAGE: ghcr.io/straits-ai/managed-agents-runtime
      CANDIDATE_IMAGE: ghcr.io/straits-ai/managed-agents-runtime:candidate-${{ needs.validate.outputs.commit }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0, Node 24
        with:
          ref: ${{ needs.validate.outputs.commit }}
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0, Node 24
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0, Node 24
        with:
          name: controlled-alpha-validation-${{ github.ref_name }}
          path: release-evidence/kernel
      - name: Require downloadable exact-commit evidence
        run: test -s release-evidence/kernel/summary.json
      - name: Initialize attestation-capable BuildKit builder
        run: |
          docker buildx create \
            --name controlled-alpha-builder \
            --driver docker-container \
            --driver-opt image=moby/buildkit:buildx-stable-1@sha256:2f5adac4ecd194d9f8c10b7b5d7bceb5186853db1b26e5abd3a657af0b7e26ec \
            --use
          docker buildx inspect --bootstrap
      - name: Authenticate candidate push to GitHub Container Registry
        env:
          REGISTRY_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: echo "${REGISTRY_TOKEN}" | docker login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin
      - name: Push candidate image with registry SBOM and provenance
        run: >-
          docker buildx build
          --platform linux/amd64
          --build-arg VERSION="${RELEASE_VERSION}"
          --build-arg REVISION="${RELEASE_COMMIT}"
          --tag "${CANDIDATE_IMAGE}"
          --attest=type=sbom,generator=docker/buildkit-syft-scanner:stable-1@sha256:79e7b013cbec16bbb436f312819a49a4a57752b2270c1a9332ae1a10fcc82a68
          --attest=type=provenance,mode=max
          --metadata-file release-evidence/registry-metadata.json
          --push
          .
      - name: Resolve, inspect, and pull the immutable candidate digest
        run: |
          registry_digest="$(node --input-type=module <<'NODE'
          import { readFile } from 'node:fs/promises';
          const metadata = JSON.parse(await readFile('release-evidence/registry-metadata.json', 'utf8'));
          const digest = metadata['containerimage.digest'];
          if (!/^sha256:[0-9a-f]{64}$/.test(digest ?? '')) {
            throw new Error('BuildKit did not return a registry manifest digest');
          }
          process.stdout.write(digest);
          NODE
          )"
          registry_image_with_digest="${REGISTRY_IMAGE}@${registry_digest}"
          echo "REGISTRY_DIGEST=${registry_digest}" >> "${GITHUB_ENV}"
          echo "REGISTRY_IMAGE_WITH_DIGEST=${registry_image_with_digest}" >> "${GITHUB_ENV}"
          echo "CONTAINER_IMAGE=${registry_image_with_digest}" >> "${GITHUB_ENV}"
          docker buildx imagetools inspect \
            "${registry_image_with_digest}" \
            --format '{{ json .Provenance }}' > release-evidence/registry-provenance.json
          docker buildx imagetools inspect \
            "${registry_image_with_digest}" \
            --format '{{ json .SBOM }}' > release-evidence/registry-sbom.json
          npm run release:attestations
          docker pull "${registry_image_with_digest}"
      - name: Remove registry credentials before executing released code
        if: always()
        run: docker logout ghcr.io
      - name: Prove anonymous token and immutable manifest access
        run: npm run release:public-image -- "${REGISTRY_IMAGE_WITH_DIGEST}"
      - name: Verify the immutable digest is publicly pullable
        run: |
          anonymous_docker_config="$(mktemp -d)"
          trap 'rm -rf "${anonymous_docker_config}"' EXIT
          DOCKER_CONFIG="${anonymous_docker_config}" docker pull "${REGISTRY_IMAGE_WITH_DIGEST}"
      - name: Smoke the pulled immutable registry digest
        run: npm run container:smoke
      - name: Record evidence for the pulled immutable registry digest
        run: npm run container:evidence
      - name: Authenticate release-tag promotion
        env:
          REGISTRY_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: echo "${REGISTRY_TOKEN}" | docker login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin
      - name: Promote the tested digest to release tags
        run: |
          docker buildx imagetools create \
            --tag "${REGISTRY_IMAGE}:${RELEASE_TAG}" \
            --tag "${REGISTRY_IMAGE}:${RELEASE_VERSION}" \
            "${REGISTRY_IMAGE_WITH_DIGEST}"
          for tag in "${RELEASE_TAG}" "${RELEASE_VERSION}"; do
            promoted_digest="$(docker buildx imagetools inspect "${REGISTRY_IMAGE}:${tag}" | awk '$1 == "Digest:" { print $2; exit }')"
            test "${promoted_digest}" = "${REGISTRY_DIGEST}"
          done
      - name: Remove registry credentials after promotion
        if: always()
        run: docker logout ghcr.io
      - name: Record registry release evidence
        run: |
          node --input-type=module <<'NODE'
          import { writeFile } from 'node:fs/promises';
          const summary = {
            schemaVersion: 1,
            status: 'passed',
            version: process.env.RELEASE_VERSION,
            tag: process.env.RELEASE_TAG,
            sourceCommit: process.env.RELEASE_COMMIT,
            image: process.env.REGISTRY_IMAGE_WITH_DIGEST,
            manifestDigest: process.env.REGISTRY_DIGEST,
            testedByDigest: true,
            promotedTags: [
              `${process.env.REGISTRY_IMAGE}:${process.env.RELEASE_TAG}`,
              `${process.env.REGISTRY_IMAGE}:${process.env.RELEASE_VERSION}`,
            ],
            attestations: ['BuildKit SLSA provenance', 'SPDX-2.3'],
            platform: 'linux/amd64',
          };
          await writeFile('release-evidence/registry-summary.json', `${JSON.stringify(summary, null, 2)}\n`);
          await writeFile(
            'release-evidence/release-notes.md',
            `Controlled multi-tenant alpha. This is not a public-beta or production-ready release.\n\n` +
            `OCI image: \`${summary.image}\`\n\n` +
            `The tested registry manifest carries BuildKit SBOM and provenance attestations. ` +
            `Download the attached CycloneDX application SBOM and exact-commit kernel evidence for audit.\n`,
          );
          NODE
          tar -czf release-evidence/controlled-alpha-kernel-evidence.tar.gz \
            -C release-evidence/kernel .
      - name: Retain release evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1, Node 24
        with:
          name: controlled-alpha-release-${{ github.ref_name }}
          path: release-evidence/
          if-no-files-found: error
          retention-days: 90
      - name: Create GitHub prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release edit "${RELEASE_TAG}" \
              --repo "${GITHUB_REPOSITORY}" \
              --prerelease \
              --title "${RELEASE_TAG}" \
              --notes-file release-evidence/release-notes.md
          else
            gh release create "${RELEASE_TAG}" \
              --repo "${GITHUB_REPOSITORY}" \
              --verify-tag \
              --prerelease \
              --title "${RELEASE_TAG}" \
              --notes-file release-evidence/release-notes.md
          fi
          gh release upload "${RELEASE_TAG}" \
            --repo "${GITHUB_REPOSITORY}" \
            --clobber \
            release-evidence/registry-summary.json \
            release-evidence/registry-provenance.json \
            release-evidence/registry-sbom.json \
            release-evidence/controlled-alpha-kernel-evidence.tar.gz \
            release-evidence/container/container-summary.json \
            release-evidence/container/container-image.json \
            release-evidence/container/container-sbom.cdx.json
